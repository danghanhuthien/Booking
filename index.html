<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Booking System — Login</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&family=DM+Serif+Display&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:       #F7F6F3;
    --surface:  #FFFFFF;
    --border:   #E4E2DC;
    --text:     #1A1917;
    --muted:    #8A8880;
    --accent:   #1A1917;
    --danger:   #C0392B;
    --radius:   12px;
    --font-sans: 'DM Sans', sans-serif;
    --font-serif:'DM Serif Display', serif;
  }

  html, body {
    height: 100%;
    background: var(--bg);
    font-family: var(--font-sans);
    color: var(--text);
  }

  body {
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 24px;
  }

  /* subtle grid bg */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(var(--border) 1px, transparent 1px),
      linear-gradient(90deg, var(--border) 1px, transparent 1px);
    background-size: 48px 48px;
    opacity: 0.5;
    pointer-events: none;
  }

  .card {
    position: relative;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 48px 44px 44px;
    width: 100%;
    max-width: 400px;
    box-shadow: 0 2px 40px rgba(0,0,0,0.06);
    animation: fadeUp 0.5s ease both;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .brand {
    margin-bottom: 36px;
  }

  .brand-mark {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 40px;
    height: 40px;
    background: var(--text);
    border-radius: 10px;
    margin-bottom: 16px;
  }

  .brand-mark svg {
    width: 20px;
    height: 20px;
    fill: none;
    stroke: #fff;
    stroke-width: 1.5;
    stroke-linecap: round;
    stroke-linejoin: round;
  }

  .brand h1 {
    font-family: var(--font-serif);
    font-size: 26px;
    font-weight: 400;
    line-height: 1.2;
    letter-spacing: -0.3px;
    color: var(--text);
  }

  .brand p {
    margin-top: 6px;
    font-size: 13.5px;
    color: var(--muted);
    font-weight: 300;
  }

  .divider {
    height: 1px;
    background: var(--border);
    margin-bottom: 28px;
  }

  .field {
    margin-bottom: 16px;
  }

  label {
    display: block;
    font-size: 12px;
    font-weight: 500;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 7px;
  }

  input {
    width: 100%;
    height: 46px;
    padding: 0 14px;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    font-family: var(--font-sans);
    font-size: 14.5px;
    color: var(--text);
    background: var(--bg);
    outline: none;
    transition: border-color 0.15s, background 0.15s;
    -webkit-appearance: none;
  }

  input:focus {
    border-color: var(--text);
    background: var(--surface);
  }

  input::placeholder { color: #C4C2BB; }

  .btn {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    width: 100%;
    height: 48px;
    margin-top: 24px;
    background: var(--text);
    color: #fff;
    border: none;
    border-radius: var(--radius);
    font-family: var(--font-sans);
    font-size: 14.5px;
    font-weight: 500;
    cursor: pointer;
    transition: opacity 0.15s, transform 0.1s;
    letter-spacing: 0.01em;
  }

  .btn:hover  { opacity: 0.85; }
  .btn:active { transform: scale(0.99); }
  .btn:disabled { opacity: 0.45; cursor: not-allowed; }

  .btn .spinner {
    width: 16px; height: 16px;
    border: 2px solid rgba(255,255,255,0.3);
    border-top-color: #fff;
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    display: none;
  }
  .btn.loading .spinner { display: block; }
  .btn.loading .btn-text { display: none; }

  @keyframes spin { to { transform: rotate(360deg); } }

  .error-msg {
    display: none;
    margin-top: 14px;
    padding: 11px 14px;
    background: #FEF2F2;
    border: 1px solid #FECACA;
    border-radius: 8px;
    font-size: 13px;
    color: var(--danger);
  }
  .error-msg.show { display: block; }

  .footer-note {
    margin-top: 28px;
    text-align: center;
    font-size: 12px;
    color: var(--muted);
  }
</style>
</head>
<body>

<div class="card">
  <div class="brand">
    <div class="brand-mark">
      <svg viewBox="0 0 24 24">
        <path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2"/>
        <rect x="9" y="3" width="6" height="4" rx="1"/>
        <path d="M9 12h6M9 16h4"/>
      </svg>
    </div>
    <h1>Booking System</h1>
    <p>Đăng nhập để tiếp tục</p>
  </div>

  <div class="divider"></div>

  <div class="field">
    <label>Tài khoản</label>
    <input type="text" id="username" placeholder="Nhập username" autocomplete="username" autofocus>
  </div>

  <div class="field">
    <label>Mật khẩu</label>
    <input type="password" id="password" placeholder="••••••••" autocomplete="current-password">
  </div>

  <button class="btn" id="loginBtn" onclick="doLogin()">
    <div class="spinner"></div>
    <span class="btn-text">Đăng nhập</span>
  </button>

  <div class="error-msg" id="errorMsg"></div>

  <div class="footer-note">Booking Management v1.0</div>
</div>

<script>
const API = 'https://script.google.com/macros/s/AKfycbw3AI5J_QO5wR9kIhoY4QP9QGoYbXBd-X2znxqXAxrYMHZN-WVrA5PMXzXQLi5VK1viKQ/exec';

// Nếu đã login rồi thì redirect luôn
if (localStorage.getItem('bk_token')) {
  window.location.href = 'main.html';
}

document.getElementById('password').addEventListener('keydown', e => {
  if (e.key === 'Enter') doLogin();
});

async function doLogin() {
  const username = document.getElementById('username').value.trim();
  const password = document.getElementById('password').value.trim();
  const btn      = document.getElementById('loginBtn');
  const errEl    = document.getElementById('errorMsg');

  if (!username || !password) {
    showError('Vui lòng nhập đầy đủ thông tin.');
    return;
  }

  btn.classList.add('loading');
  btn.disabled = true;
  errEl.classList.remove('show');

  try {
    const res  = await fetch(API, {
      method: 'POST',
      body: JSON.stringify({ action: 'login', username, password })
    });
    const json = await res.json();

    if (json.success) {
      localStorage.setItem('bk_token',       json.data.token);
      localStorage.setItem('bk_role',        json.data.role);
      localStorage.setItem('bk_displayName', json.data.displayName);
      window.location.href = 'main.html';
    } else {
      showError(json.message || 'Đăng nhập thất bại.');
    }
  } catch (e) {
    showError('Không kết nối được server. Thử lại sau.');
  } finally {
    btn.classList.remove('loading');
    btn.disabled = false;
  }
}

function showError(msg) {
  const el = document.getElementById('errorMsg');
  el.textContent = msg;
  el.classList.add('show');
}
</script>
</body>
</html>
