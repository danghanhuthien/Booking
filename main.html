<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Booking System</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&family=DM+Serif+Display&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:        #F7F6F3;
  --surface:   #FFFFFF;
  --surface2:  #F0EFE9;
  --border:    #E4E2DC;
  --text:      #1A1917;
  --muted:     #8A8880;
  --accent:    #1A1917;
  --green:     #1A6648;
  --green-bg:  #E8F5EE;
  --amber:     #92550A;
  --amber-bg:  #FEF3E2;
  --blue:      #1D4ED8;
  --blue-bg:   #EFF6FF;
  --red:       #C0392B;
  --red-bg:    #FEF2F2;
  --purple:    #6D28D9;
  --purple-bg: #F5F3FF;
  --radius:    10px;
  --font-sans: 'DM Sans', sans-serif;
  --font-serif:'DM Serif Display', serif;
}

html, body { height: 100%; background: var(--bg); font-family: var(--font-sans); color: var(--text); }

/* ── LAYOUT ── */
.app { display: flex; flex-direction: column; min-height: 100vh; }

/* ── HEADER ── */
.header {
  position: sticky; top: 0; z-index: 100;
  background: rgba(247,246,243,0.92);
  backdrop-filter: blur(12px);
  border-bottom: 1px solid var(--border);
  padding: 0 28px;
  height: 60px;
  display: flex; align-items: center; justify-content: space-between;
}

.header-left { display: flex; align-items: center; gap: 12px; }

.logo-mark {
  width: 32px; height: 32px;
  background: var(--text);
  border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
}
.logo-mark svg { width: 16px; height: 16px; stroke: #fff; fill: none; stroke-width: 1.5; stroke-linecap: round; stroke-linejoin: round; }

.header h1 { font-family: var(--font-serif); font-size: 18px; font-weight: 400; }

.header-right { display: flex; align-items: center; gap: 16px; }

.user-info { display: flex; align-items: center; gap: 8px; }
.user-avatar {
  width: 30px; height: 30px;
  border-radius: 50%;
  background: var(--surface2);
  border: 1px solid var(--border);
  display: flex; align-items: center; justify-content: center;
  font-size: 12px; font-weight: 500; color: var(--muted);
}
.user-name { font-size: 13.5px; font-weight: 500; }
.user-role-badge {
  font-size: 11px; font-weight: 500;
  padding: 2px 8px; border-radius: 20px;
  letter-spacing: 0.03em;
}

.btn-logout {
  display: flex; align-items: center; gap: 6px;
  padding: 0 14px; height: 32px;
  background: transparent;
  border: 1px solid var(--border);
  border-radius: 8px;
  font-family: var(--font-sans); font-size: 13px;
  color: var(--muted); cursor: pointer;
  transition: all 0.15s;
}
.btn-logout:hover { border-color: var(--text); color: var(--text); }
.btn-logout svg { width: 14px; height: 14px; stroke: currentColor; fill: none; stroke-width: 1.5; stroke-linecap: round; }

/* ── TOOLBAR ── */
.toolbar {
  padding: 16px 28px;
  display: flex; align-items: center; gap: 12px; flex-wrap: wrap;
}

.month-tabs { display: flex; gap: 4px; background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 3px; }
.month-tab {
  padding: 5px 14px; border-radius: 7px; border: none; background: transparent;
  font-family: var(--font-sans); font-size: 13px; font-weight: 500; color: var(--muted);
  cursor: pointer; transition: all 0.15s;
}
.month-tab.active { background: var(--text); color: #fff; }
.month-tab:hover:not(.active) { color: var(--text); }

.toolbar-right { margin-left: auto; display: flex; gap: 8px; }

.btn-primary {
  display: flex; align-items: center; gap: 7px;
  height: 36px; padding: 0 16px;
  background: var(--text); color: #fff;
  border: none; border-radius: 9px;
  font-family: var(--font-sans); font-size: 13.5px; font-weight: 500;
  cursor: pointer; transition: opacity 0.15s;
}
.btn-primary:hover { opacity: 0.82; }
.btn-primary svg { width: 15px; height: 15px; stroke: #fff; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }

/* ── STATS ROW ── */
.stats-row { padding: 0 28px 18px; display: flex; gap: 10px; flex-wrap: wrap; }
.stat-card {
  flex: 1; min-width: 100px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 12px 14px;
}
.stat-label { font-size: 10.5px; font-weight: 500; color: var(--muted); text-transform: uppercase; letter-spacing: 0.04em; margin-bottom: 5px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.stat-value { font-size: 22px; font-family: var(--font-serif); font-weight: 400; }

/* ── TABLE WRAPPER ── */
.table-wrap {
  margin: 0 28px 28px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 14px;
  overflow: hidden;
}

.table-header-bar {
  padding: 14px 20px;
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between;
}
.table-title { font-size: 13px; font-weight: 500; }
.record-count { font-size: 12px; color: var(--muted); }

.table-scroll { overflow-x: auto; }

table { width: 100%; border-collapse: collapse; font-size: 13px; }
thead th {
  padding: 10px 14px;
  text-align: left;
  font-size: 11px; font-weight: 500; letter-spacing: 0.05em; text-transform: uppercase;
  color: var(--muted);
  background: var(--bg);
  border-bottom: 1px solid var(--border);
  white-space: nowrap;
}
tbody tr {
  border-bottom: 1px solid var(--border);
  transition: background 0.1s;
  cursor: pointer;
}
tbody tr:last-child { border-bottom: none; }
tbody tr:hover { background: var(--bg); }
tbody td { padding: 11px 14px; vertical-align: middle; white-space: nowrap; }

.td-code { font-weight: 500; font-family: monospace; font-size: 12.5px; }
.td-muted { color: var(--muted); font-size: 12px; }

/* Status badges */
.badge {
  display: inline-flex; align-items: center;
  padding: 3px 9px; border-radius: 20px;
  font-size: 11.5px; font-weight: 500; white-space: nowrap;
}
.badge-new      { background: var(--blue-bg);   color: var(--blue);   }
.badge-confirm  { background: var(--amber-bg);  color: var(--amber);  }
.badge-dconfirm { background: var(--green-bg);  color: var(--green);  }
.badge-final    { background: var(--purple-bg); color: var(--purple); }
.badge-done     { background: #F0FDF4;          color: #166534;       }
.badge-cancel   { background: var(--red-bg);    color: var(--red);    }
.badge-purple   { background: var(--purple-bg); color: var(--purple); }
.badge-default  { background: var(--surface2);  color: var(--muted);  }

/* Action buttons in row */
.btn-row-edit {
  display: inline-flex; align-items: center; gap: 4px;
  padding: 4px 10px; border-radius: 6px;
  border: 1px solid var(--border); background: transparent;
  font-family: var(--font-sans); font-size: 12px; color: var(--text);
  cursor: pointer; transition: all 0.12s;
}
.btn-row-edit:hover { border-color: var(--text); }
.btn-row-edit svg { width: 12px; height: 12px; stroke: currentColor; fill: none; stroke-width: 1.5; stroke-linecap: round; stroke-linejoin: round; }

/* ── EMPTY STATE ── */
.empty-state {
  padding: 64px 24px; text-align: center;
}
.empty-state svg { width: 40px; height: 40px; stroke: var(--border); fill: none; stroke-width: 1.2; stroke-linecap: round; margin-bottom: 14px; }
.empty-state p { color: var(--muted); font-size: 14px; }

/* ── LOADING ── */
.loading-state { padding: 48px; text-align: center; color: var(--muted); font-size: 13.5px; }
.dots { display: inline-flex; gap: 5px; margin-left: 8px; }
.dots span { width: 5px; height: 5px; border-radius: 50%; background: var(--muted); animation: dot 1.2s infinite; }
.dots span:nth-child(2) { animation-delay: 0.2s; }
.dots span:nth-child(3) { animation-delay: 0.4s; }
@keyframes dot { 0%,80%,100%{opacity:0.2} 40%{opacity:1} }

/* ── MODAL OVERLAY ── */
.overlay {
  display: none; position: fixed; inset: 0; z-index: 200;
  background: rgba(26,25,23,0.45);
  align-items: center; justify-content: center;
  padding: 20px;
  animation: fadeIn 0.15s ease;
}
.overlay.open { display: flex; }
@keyframes fadeIn { from{opacity:0} to{opacity:1} }

.modal {
  background: var(--surface);
  border-radius: 18px;
  width: 100%; max-width: 640px;
  max-height: 90vh;
  display: flex; flex-direction: column;
  animation: slideUp 0.2s ease;
  box-shadow: 0 24px 64px rgba(0,0,0,0.15);
}
@keyframes slideUp { from{transform:translateY(12px);opacity:0} to{transform:translateY(0);opacity:1} }

.modal-header {
  padding: 22px 24px 18px;
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between;
}
.modal-title { font-family: var(--font-serif); font-size: 20px; font-weight: 400; }
.btn-close {
  width: 32px; height: 32px; border-radius: 8px; border: 1px solid var(--border);
  background: transparent; cursor: pointer; display: flex; align-items: center; justify-content: center;
  transition: all 0.12s;
}
.btn-close:hover { background: var(--bg); }
.btn-close svg { width: 15px; height: 15px; stroke: var(--muted); fill: none; stroke-width: 2; stroke-linecap: round; }

.modal-body { padding: 22px 24px; overflow-y: auto; flex: 1; }
.modal-footer {
  padding: 16px 24px;
  border-top: 1px solid var(--border);
  display: flex; gap: 10px; justify-content: flex-end;
}

/* Form inside modal */
.form-section { margin-bottom: 24px; }
.form-section-title {
  font-size: 11px; font-weight: 500; letter-spacing: 0.07em; text-transform: uppercase;
  color: var(--muted); margin-bottom: 14px;
  padding-bottom: 8px; border-bottom: 1px solid var(--border);
}
.form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
.form-grid.col3 { grid-template-columns: 1fr 1fr 1fr; }
.form-field { display: flex; flex-direction: column; gap: 6px; }
.form-field.span2 { grid-column: span 2; }
.form-field.span3 { grid-column: span 3; }

.form-label {
  font-size: 11.5px; font-weight: 500; color: var(--muted);
  text-transform: uppercase; letter-spacing: 0.05em;
}
.form-input, .form-select, .form-textarea {
  height: 40px; padding: 0 12px;
  border: 1px solid var(--border); border-radius: 8px;
  font-family: var(--font-sans); font-size: 13.5px; color: var(--text);
  background: var(--bg); outline: none;
  transition: border-color 0.15s, background 0.15s;
}
.form-input:focus, .form-select:focus, .form-textarea:focus {
  border-color: var(--text); background: var(--surface);
}
.form-input:disabled, .form-select:disabled, .form-textarea:disabled {
  opacity: 0.35; cursor: not-allowed;
  background: var(--surface2); color: var(--muted); border-color: var(--border);
}
.form-input:not(:disabled), .form-select:not(:disabled), .form-textarea:not(:disabled) {
  background: var(--surface);
  border-color: #5A9FD4;
  box-shadow: 0 0 0 3px rgba(29,78,216,0.07);
}
.form-input:not(:disabled):focus, .form-textarea:not(:disabled):focus {
  border-color: var(--text); box-shadow: 0 0 0 3px rgba(26,25,23,0.09);
}
.form-label-editable { color: var(--text) !important; }
.form-label-locked   { color: var(--muted); font-style: italic; }
.field-wrap { position: relative; }
.lock-icon {
  position: absolute; right: 10px; top: 50%; transform: translateY(-50%);
  width: 13px; height: 13px; opacity: 0.35; pointer-events: none;
}
.form-input::placeholder { color: #C4C2BB; }
.form-textarea { height: 76px; padding: 10px 12px; resize: none; }
.form-select { cursor: pointer; }

/* Room number row */
.room-row { display: flex; gap: 8px; }
.room-item { flex: 1; display: flex; flex-direction: column; gap: 5px; align-items: center; }
.room-item-label { font-size: 10.5px; color: var(--muted); font-weight: 500; text-transform: uppercase; letter-spacing: 0.05em; }
.room-item input { width: 100%; height: 38px; text-align: center; border: 1px solid var(--border); border-radius: 8px; font-family: var(--font-sans); font-size: 14px; font-weight: 500; color: var(--text); background: var(--bg); outline: none; transition: border-color 0.15s; }
.room-item input:focus { border-color: var(--text); }
.room-item input:disabled { opacity: 0.4; }

.btn-secondary {
  height: 40px; padding: 0 18px;
  background: transparent; border: 1px solid var(--border); border-radius: 9px;
  font-family: var(--font-sans); font-size: 13.5px; color: var(--text);
  cursor: pointer; transition: all 0.15s;
}
.btn-secondary:hover { border-color: var(--text); }

.btn-submit {
  height: 40px; padding: 0 22px;
  background: var(--text); color: #fff; border: none; border-radius: 9px;
  font-family: var(--font-sans); font-size: 13.5px; font-weight: 500;
  cursor: pointer; transition: opacity 0.15s;
  display: flex; align-items: center; gap: 7px;
}
.btn-submit:hover { opacity: 0.82; }
.btn-submit:disabled { opacity: 0.4; cursor: not-allowed; }
.btn-submit .spinner { width: 14px; height: 14px; border: 2px solid rgba(255,255,255,0.3); border-top-color: #fff; border-radius: 50%; animation: spin 0.7s linear infinite; display: none; }
.btn-submit.loading .spinner { display: block; }
.btn-submit.loading .btn-submit-text { display: none; }
@keyframes spin { to{transform:rotate(360deg)} }

/* Toast */
.toast {
  position: fixed; bottom: 28px; right: 28px; z-index: 999;
  padding: 12px 18px; border-radius: 10px;
  font-size: 13.5px; font-weight: 500;
  box-shadow: 0 4px 20px rgba(0,0,0,0.12);
  transform: translateY(8px); opacity: 0;
  transition: all 0.2s;
  pointer-events: none;
}
.toast.show { transform: translateY(0); opacity: 1; }
.toast.success { background: #1A6648; color: #fff; }
.toast.error   { background: var(--red); color: #fff; }

/* Responsive */
@media (max-width: 640px) {
  .header { padding: 0 16px; }
  .toolbar, .stats-row { padding-left: 16px; padding-right: 16px; }
  .table-wrap { margin: 0 16px 24px; }
  .form-grid { grid-template-columns: 1fr; }
  .form-grid.col3 { grid-template-columns: 1fr 1fr; }
  .form-field.span2, .form-field.span3 { grid-column: span 1; }
  .user-name { display: none; }
}
</style>
</head>
<body>

<div class="app">

  <!-- HEADER -->
  <header class="header">
    <div class="header-left">
      <div class="logo-mark">
        <svg viewBox="0 0 24 24">
          <path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2"/>
          <rect x="9" y="3" width="6" height="4" rx="1"/>
          <path d="M9 12h6M9 16h4"/>
        </svg>
      </div>
      <h1>Booking System</h1>
    </div>
    <div class="header-right">
      <div class="user-info">
        <div class="user-avatar" id="userAvatar">–</div>
        <span class="user-name" id="userName">–</span>
        <span class="user-role-badge badge badge-default" id="userRoleBadge">–</span>
      </div>
      <button class="btn-logout" onclick="doLogout()">
        <svg viewBox="0 0 24 24"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4M16 17l5-5-5-5M21 12H9"/></svg>
        Đăng xuất
      </button>
    </div>
  </header>

  <!-- TOOLBAR -->
  <div class="toolbar">
    <div class="month-tabs" id="monthTabs"></div>
    <div class="toolbar-right">
      <button class="btn-primary" id="btnNew" onclick="openCreateModal()" style="display:none">
        <svg viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        Tạo booking
      </button>
    </div>
  </div>

  <!-- STATS -->
  <div class="stats-row">
    <div class="stat-card">
      <div class="stat-label">Tổng</div>
      <div class="stat-value" id="statTotal">–</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">New Booking</div>
      <div class="stat-value" id="statNew">–</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Pending Confirm</div>
      <div class="stat-value" id="statPending">–</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Confirmed</div>
      <div class="stat-value" id="statConfirmed">–</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Booking Confirmed</div>
      <div class="stat-value" id="statBookingConfirmed">–</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Final Booking</div>
      <div class="stat-value" id="statFinal">–</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Done</div>
      <div class="stat-value" id="statDone">–</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Cancel</div>
      <div class="stat-value" id="statCancel">–</div>
    </div>
  </div>

  <!-- TABLE -->
  <div class="table-wrap">
    <div class="table-header-bar">
      <span class="table-title">Danh sách booking</span>
      <span class="record-count" id="recordCount"></span>
    </div>
    <div class="table-scroll">
      <table>
        <thead>
          <tr>
            <th>Code</th>
            <th>Ngày đến</th>
            <th>Số đêm</th>
            <th>Khách</th>
            <th>Chuyến bay</th>
            <th>KS PTTY</th>
            <th>KS BKK</th>
            <th>Guide</th>
            <th>Trạng thái</th>
            <th></th>
          </tr>
        </thead>
        <tbody id="tableBody">
          <tr><td colspan="10"><div class="loading-state">Đang tải dữ liệu<span class="dots"><span></span><span></span><span></span></span></div></td></tr>
        </tbody>
      </table>
    </div>
  </div>

</div><!-- /app -->

<!-- MODAL -->
<div class="overlay" id="modalOverlay">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title" id="modalTitle">Tạo booking mới</span>
      <button class="btn-close" onclick="closeModal()">
        <svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <div class="modal-body" id="modalBody"></div>
    <div class="modal-footer">
      <button class="btn-secondary" onclick="closeModal()">Hủy</button>
      <button class="btn-submit" id="btnSubmit" onclick="submitForm()">
        <div class="spinner"></div>
        <span class="btn-submit-text">Lưu</span>
      </button>
    </div>
  </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script>
const API = 'https://script.google.com/macros/s/AKfycbw3AI5J_QO5wR9kIhoY4QP9QGoYbXBd-X2znxqXAxrYMHZN-WVrA5PMXzXQLi5VK1viKQ/exec';

// ── AUTH CHECK ──
const token       = localStorage.getItem('bk_token');
const role        = localStorage.getItem('bk_role');
const displayName = localStorage.getItem('bk_displayName');

if (!token) { window.location.href = 'index.html'; }

// ── INIT USER UI ──
const initials = (displayName || '?').split(' ').map(w => w[0]).join('').slice(0,2).toUpperCase();
document.getElementById('userAvatar').textContent    = initials;
document.getElementById('userName').textContent      = displayName || '';

const roleBadge = document.getElementById('userRoleBadge');
roleBadge.textContent = role || '';
const roleColors = { 'Sale':'badge-new','OP':'badge-confirm','OP Bus':'badge-final','CEO':'badge-dconfirm','Admin':'badge-done' };
roleBadge.className = 'user-role-badge badge ' + (roleColors[role] || 'badge-default');

if (role === 'Sale') document.getElementById('btnNew').style.display = 'flex';

// ── STATE ──
let allBookings  = [];
let allHeaders   = [];
let currentMonth = '';
let editingRow   = null;

// ── MONTHS ──
function getCurrentMonthName() {
  const d  = new Date();
  const mm = String(d.getMonth()+1).padStart(2,'0');
  const yy = String(d.getFullYear()).slice(-2);
  return mm + '.' + yy;
}

async function loadSheetTabs() {
  try {
    const res  = await fetch(`${API}?action=getSheets&token=${token}`);
    const json = await res.json();
    if (!json.success || !json.data.length) {
      // Fallback: chỉ hiện tháng hiện tại
      return [getCurrentMonthName()];
    }
    // Sort tháng tăng dần
    return json.data.sort();
  } catch(e) {
    return [getCurrentMonthName()];
  }
}

function buildMonthTabs(sheets, selected) {
  const container = document.getElementById('monthTabs');
  container.innerHTML = '';
  sheets.forEach(m => {
    const btn = document.createElement('button');
    btn.className = 'month-tab' + (m === selected ? ' active' : '');
    btn.textContent = m;
    btn.onclick = () => loadMonth(m);
    container.appendChild(btn);
  });
}

// ── LOAD DATA ──
let monthSheets = [];

async function loadMonth(month) {
  currentMonth = month;
  buildMonthTabs(monthSheets, month);
  const colSpan = allHeaders.length || 10;
  document.getElementById('tableBody').innerHTML =
    `<tr><td colspan="${colSpan + 1}"><div class="loading-state">Đang tải<span class="dots"><span></span><span></span><span></span></span></div></td></tr>`;
  resetStats();

  try {
    const res  = await fetch(`${API}?action=getBookings&token=${token}&month=${month}`);
    const json = await res.json();
    if (!json.success) throw new Error(json.message);
    allHeaders  = json.data.headers || [];
    allBookings = json.data.rows    || [];
    renderTable(json.data);
    renderStats(allBookings);
  } catch(e) {
    document.getElementById('tableBody').innerHTML =
      `<tr><td colspan="10"><div class="empty-state"><p>Lỗi tải dữ liệu: ${e.message}</p></div></td></tr>`;
  }
}

// Cột hiển thị trong bảng (đúng thứ tự)
const TABLE_COLS = [
  'BOOKING CODE','SALE','Trạng thái','Nhắc nhở','GUIDE','TT Tài xế',
  'PTTY Hotel','BKK Hotel','ARR No.','Time',
  'Ngày đến','Ngày đi','PAX','TWN','DBL','SGL','TRP','GUIDE ROOM',
  'File RML','File JOB','NOTE','Bus','Seat',
  'Ngày check in PTTY','Ngày check out PTTY','Số ngày PTTY',
  'Ngày check in BKK','Ngày check out BKK','Số ngày BKK',
  'Ngày check in BKK 2','Ngày check out BKK 2','Số ngày BKK 2'
];

// ── RENDER TABLE ──
function renderTable(result) {
  const tbody   = document.getElementById('tableBody');
  const theadTr = document.querySelector('thead tr');
  const rows    = result.rows || [];
  const headers = result.headers || [];

  document.getElementById('recordCount').textContent = rows.length + ' booking';

  // Chỉ hiện các cột có trong TABLE_COLS VÀ có trong headers thực tế của sheet
  const visCols = TABLE_COLS.filter(c => headers.includes(c));
  theadTr.innerHTML = visCols.map(h =>
    `<th>${h}</th>`
  ).join('') + '<th></th>';

  if (!rows.length) {
    tbody.innerHTML = `<tr><td colspan="${visCols.length + 1}"><div class="empty-state">
      <svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M9 9h6M9 13h4"/></svg>
      <p>Chưa có booking nào trong tháng này</p>
    </div></td></tr>`;
    return;
  }

  tbody.innerHTML = rows.map((b, idx) => {
    const cells = visCols.map(h => {
      const val = b[h];
      if (h === 'Trạng thái') return `<td>${statusBadge(val)}</td>`;
      if (h === 'Ngày đến' || h === 'Ngày đi') return `<td class="td-muted">${formatDate(val)}</td>`;
      if (h === 'BOOKING CODE') return `<td class="td-code">${val || '—'}</td>`;
      return `<td class="td-muted">${val !== '' && val !== undefined ? val : '—'}</td>`;
    }).join('');
    return `<tr onclick="openEditModal(${idx})">
      ${cells}
      <td>
        <button class="btn-row-edit" onclick="event.stopPropagation();openEditModal(${idx})">
          <svg viewBox="0 0 24 24"><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
          Sửa
        </button>
      </td>
    </tr>`;
  }).join('');
}

// ── STATS ──
function renderStats(rows) {
  const counts = {
    total: rows.length,
    new: 0, pending: 0, confirmed: 0,
    bookingConfirmed: 0, final: 0, done: 0, cancel: 0
  };
  rows.forEach(b => {
    const s = String(b['Trạng thái'] || '').trim();
    if (s === 'New Booking')       counts.new++;
    else if (s === 'Pending Confirm')   counts.pending++;
    else if (s === 'Confirmed')         counts.confirmed++;
    else if (s === 'Booking Confirmed') counts.bookingConfirmed++;
    else if (s === 'Final Booking')     counts.final++;
    else if (s === 'Done')              counts.done++;
    else if (s === 'Cancel')            counts.cancel++;
  });
  document.getElementById('statTotal').textContent            = counts.total;
  document.getElementById('statNew').textContent              = counts.new;
  document.getElementById('statPending').textContent          = counts.pending;
  document.getElementById('statConfirmed').textContent        = counts.confirmed;
  document.getElementById('statBookingConfirmed').textContent = counts.bookingConfirmed;
  document.getElementById('statFinal').textContent            = counts.final;
  document.getElementById('statDone').textContent             = counts.done;
  document.getElementById('statCancel').textContent           = counts.cancel;
}

function resetStats() {
  ['statTotal','statNew','statPending','statConfirmed',
   'statBookingConfirmed','statFinal','statDone','statCancel'].forEach(id => {
    document.getElementById(id).textContent = '–';
  });
}

// ── MODAL ──
function openCreateModal() {
  editingRow = null;
  document.getElementById('modalTitle').textContent = 'Tạo booking mới';
  document.getElementById('btnSubmit').querySelector('.btn-submit-text').textContent = 'Tạo booking';
  document.getElementById('modalBody').innerHTML = buildForm(null);
  document.getElementById('modalOverlay').classList.add('open');
}

function openEditModal(idx) {
  const b = allBookings[idx];
  editingRow = { sheetName: b._sheetName || currentMonth, rowIndex: b._rowIndex };
  document.getElementById('modalTitle').textContent = 'Chỉnh sửa — ' + (b.code_booking || '');
  document.getElementById('btnSubmit').querySelector('.btn-submit-text').textContent = 'Lưu thay đổi';
  document.getElementById('modalBody').innerHTML = buildForm(b);
  document.getElementById('modalOverlay').classList.add('open');
}

function closeModal() {
  document.getElementById('modalOverlay').classList.remove('open');
}

// Close on overlay click
document.getElementById('modalOverlay').addEventListener('click', e => {
  if (e.target === document.getElementById('modalOverlay')) closeModal();
});

// ── BUILD FORM ĐỘNG ──
const ROLE_FIELDS_FE = {
  'Sale':   ['BOOKING CODE','SALE','Ngày đến','Ngày đi','Số đêm','PAX','TWN','DBL','SGL','TRP','GUIDE ROOM','ARR No.','Time','Bus','Seat','NOTE'],
  'OP':     ['PTTY Hotel','BKK Hotel'],
  'OP Bus': ['TT Tài xế'],
  'CEO':    ['GUIDE']
};
const myFields = role === 'Admin' ? null : (ROLE_FIELDS_FE[role] || []);
// null = Admin được sửa hết

function canEdit(colName) {
  if (role === 'Admin') return true;
  return myFields && myFields.includes(colName);
}

function buildForm(b) {
  const skipCols = ['_rowIndex','_sheetName'];
  const cols = allHeaders.filter(h => h && !skipCols.includes(h));

  if (!cols.length) return '<p style="color:var(--muted);font-size:13px">Không có dữ liệu header.</p>';

  const fields = cols.map(colName => {
    const editable = canEdit(colName);
    const curVal   = b ? (b[colName] !== undefined ? b[colName] : '') : '';
    const disAttr  = editable ? '' : 'disabled';

    // Detect loại input
    const lower = colName.toLowerCase();
    const isDate = lower.includes('ngày') || lower.includes('date');
    const isNum  = ['pax','twn','dbl','sgl','trp','guide room','số đêm','seat'].some(k => lower.includes(k));
    const isNote = lower === 'note' || lower === 'ghi chú';

    const STATUS_OPTIONS = ['New Booking','Pending Confirm','Confirmed','Booking Confirmed','Final Booking','Done','Cancel'];
    const isStatus = colName === 'Trạng thái';
    const isSale   = colName === 'SALE';

    // SALE: tự gán từ displayName, readonly
    const autoVal = isSale ? displayName : curVal;

    let input;
    if (isStatus && editable) {
      const opts = STATUS_OPTIONS.map(o =>
        `<option value="${o}" ${autoVal === o ? 'selected' : ''}>${o}</option>`
      ).join('');
      input = `<select class="form-select" id="ff_${esc(colName)}">${opts}</select>`;
    } else if (isNote) {
      input = `<textarea class="form-textarea" id="ff_${esc(colName)}" ${disAttr} placeholder="...">${escHtml(autoVal)}</textarea>`;
    } else if (isDate) {
      input = `<input class="form-input" type="date" id="ff_${esc(colName)}" value="${toInputDate(autoVal)}" ${disAttr}>`;
    } else if (isNum) {
      input = `<input class="form-input" type="number" id="ff_${esc(colName)}" value="${escHtml(autoVal)}" ${disAttr} min="0" placeholder="0">`;
    } else {
      input = `<input class="form-input" id="ff_${esc(colName)}" value="${escHtml(autoVal)}" ${disAttr} placeholder="">`;
    }

    const labelCls = editable ? 'form-label form-label-editable' : 'form-label form-label-locked'
    const lockSvg  = editable ? '' : `<svg class="lock-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg>`
    return `<div class="form-field">
      <label class="${labelCls}">${escHtml(colName)}${editable ? ' <span style="color:#5A9FD4;font-size:10px">✎</span>' : ''}</label>
      <div class="field-wrap">${input}${lockSvg}</div>
    </div>`;
  }).join('');

  return `<div class="form-grid">${fields}</div>`;
}

function esc(str) {
  return String(str).replace(/[^a-zA-Z0-9]/g, '_');
}
function escHtml(str) {
  return String(str).replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ── SUBMIT ──
async function submitForm() {
  const btn = document.getElementById('btnSubmit');
  btn.disabled = true;
  btn.classList.add('loading');

  // Collect tất cả field trong form (chỉ lấy field không disabled)
  const data = {};
  allHeaders.forEach(colName => {
    if (!colName || colName.startsWith('_')) return;
    const el = document.getElementById('ff_' + esc(colName));
    if (el && !el.disabled) data[colName] = el.value.trim();
  });
  // SALE luôn gán từ người đang login (kể cả bị disabled)
  if (allHeaders.includes('SALE')) data['SALE'] = displayName;

  try {
    let body;
    if (!editingRow) {
      body = { action: 'createBooking', token, data };
    } else {
      body = { action: 'updateBooking', token, sheetName: editingRow.sheetName, rowIndex: editingRow.rowIndex, data };
    }

    const res  = await fetch(API, { method: 'POST', body: JSON.stringify(body) });
    const json = await res.json();
    if (!json.success) throw new Error(json.message);

    closeModal();
    showToast(editingRow ? 'Cập nhật thành công' : 'Tạo booking thành công', 'success');
    await loadMonth(currentMonth);
  } catch(e) {
    showToast('Lỗi: ' + e.message, 'error');
  } finally {
    btn.disabled = false;
    btn.classList.remove('loading');
  }
}

// ── LOGOUT ──
function doLogout() {
  localStorage.removeItem('bk_token');
  localStorage.removeItem('bk_role');
  localStorage.removeItem('bk_displayName');
  window.location.href = 'index.html';
}

// ── HELPERS ──
function statusBadge(status) {
  const s = String(status || '').trim();
  const map = {
    'New Booking':      'badge-new',
    'Pending Confirm':  'badge-confirm',
    'Confirmed':        'badge-dconfirm',
    'Booking Confirmed':'badge-final',
    'Final Booking':    'badge-purple',
    'Done':             'badge-done',
    'Cancel':           'badge-cancel',
  };
  const cls = map[s] || 'badge-default';
  return `<span class="badge ${cls}">${s || '—'}</span>`;
}

function formatDate(val) {
  if (!val) return '—';
  const d = new Date(val);
  if (isNaN(d)) return val;
  return d.toLocaleDateString('vi-VN', { day:'2-digit', month:'2-digit', year:'numeric' });
}

function toInputDate(val) {
  if (!val) return '';
  const d = new Date(val);
  if (isNaN(d)) return '';
  return d.toISOString().slice(0,10);
}

function showToast(msg, type = 'success') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className   = `toast ${type} show`;
  setTimeout(() => t.classList.remove('show'), 3000);
}

// ── BOOT ──
(async function init() {
  monthSheets = await loadSheetTabs();
  // Chọn tab mặc định: tháng hiện tại nếu có, không thì tab cuối
  const cur = getCurrentMonthName();
  const defaultMonth = monthSheets.includes(cur) ? cur : monthSheets[monthSheets.length - 1];
  buildMonthTabs(monthSheets, defaultMonth);
  await loadMonth(defaultMonth);
})();
</script>
